services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-panama_dev}
      POSTGRES_USER: ${DB_USER:-panama}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-panama}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-panama_dev}
      DB_USER: ${DB_USER:-panama}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_SSL: ${DB_SSL:-true}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:?ALLOWED_ORIGIN is required}
      HOST: 0.0.0.0
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  uploads:
