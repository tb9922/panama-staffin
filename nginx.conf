# Panama Staffing — Nginx reverse proxy configuration
#
# Install: sudo cp nginx.conf /etc/nginx/sites-available/panama
#          sudo ln -s /etc/nginx/sites-available/panama /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# SSL setup: sudo certbot --nginx -d panama.yourdomain.com
#
# Replace panama.yourdomain.com with your actual domain.

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=60r/s;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name panama.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name panama.yourdomain.com;
    server_tokens off;

    # SSL — managed by Certbot (uncomment after certbot setup)
    # ssl_certificate     /etc/letsencrypt/live/panama.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/panama.yourdomain.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (supplement Helmet.js — belt and braces)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Request size limit (Express JSON body limit is 1mb. This higher Nginx limit accommodates potential future file uploads.)
    client_max_body_size 25m;

    # Gzip compression for static assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Health check — no rate limit, used by uptime monitors
    location = /health {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    location = /readiness {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    location = /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Login — strict rate limit (10 req/min per IP)
    location /api/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API — moderate rate limit
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long operations (payroll calc, SAR, PDF generation)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Static frontend assets — served by Nginx, not Node
    location / {
        root /var/www/panama-staffing/dist;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively (Vite hashes filenames)
        # Note: nested location inherits parent headers in nginx 1.7.5+
        # but add_header in nested block would REPLACE parent headers.
        # Using expires only — security headers inherited from server block.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
        }
    }
}
