name: Tests

on:
  push:
    branches: [main, v1-os]
  pull_request:
    branches: [main, v1-os]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SENTRY_CONFIGURED: ${{ secrets.SENTRY_AUTH_TOKEN != '' && secrets.SENTRY_ORG != '' && secrets.SENTRY_PROJECT != '' }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: panama_test
          POSTGRES_USER: panama
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build container image
        run: docker build -t panama-staffing:ci .

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: panama-staffing:ci
          format: table
          scanners: vuln
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload frontend source maps to Sentry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.SENTRY_CONFIGURED == 'true'
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
        with:
          version: ${{ github.sha }}
          environment: production
          sourcemaps: ./dist/assets
          ignore_missing: true

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Run database migrations
        run: node scripts/migrate.js
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: panama_test
          DB_USER: panama
          DB_PASSWORD: test_password
          DB_SSL: 'false'
          JWT_SECRET: ci_test_jwt_secret_not_used_in_prod_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          VIEWER_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          ALLOWED_ORIGIN: http://localhost:5173

      - name: Run unit tests
        run: npm run test:ci
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: panama_test
          DB_USER: panama
          DB_PASSWORD: test_password
          DB_SSL: 'false'
          JWT_SECRET: ci_test_jwt_secret_not_used_in_prod_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          VIEWER_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          ALLOWED_ORIGIN: http://localhost:5173

      - name: Run integration tests
        run: npm run test:integration

      - name: Run frontend component tests
        run: npm run test:frontend

      - name: Run route auth audit
        run: npm run audit:routes
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: panama_test
          DB_USER: panama
          DB_PASSWORD: test_password
          DB_SSL: 'false'
          JWT_SECRET: ci_test_jwt_secret_not_used_in_prod_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          VIEWER_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          ALLOWED_ORIGIN: http://localhost:5173

      - name: Verify HR EDI encryption
        run: npm run verify:hr-edi-encryption
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: panama_test
          DB_USER: panama
          DB_PASSWORD: test_password
          DB_SSL: 'false'
          JWT_SECRET: ci_test_jwt_secret_not_used_in_prod_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          VIEWER_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          ALLOWED_ORIGIN: http://localhost:5173

      - name: Verify HR health encryption
        run: npm run verify:hr-health-encryption
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: panama_test
          DB_USER: panama
          DB_PASSWORD: test_password
          DB_SSL: 'false'
          JWT_SECRET: ci_test_jwt_secret_not_used_in_prod_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          VIEWER_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          ALLOWED_ORIGIN: http://localhost:5173

      - name: Seed E2E test data
        run: node scripts/seed-e2e.js
        env:
          NODE_ENV: test
          E2E_SEED_ALLOW: '1'
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: panama_test
          DB_USER: panama
          DB_PASSWORD: test_password
          DB_SSL: 'false'

      - name: Run V1 action backfill gate
        run: npm run verify:action-backfill
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: panama_test
          DB_USER: panama
          DB_PASSWORD: test_password
          DB_SSL: 'false'
          JWT_SECRET: ci_test_jwt_secret_not_used_in_prod_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          VIEWER_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          ALLOWED_ORIGIN: http://localhost:5173

      - name: Run V1 operational gate
        run: npm run verify:v1-operational
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: panama_test
          DB_USER: panama
          DB_PASSWORD: test_password
          DB_SSL: 'false'
          JWT_SECRET: ci_test_jwt_secret_not_used_in_prod_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          VIEWER_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          ALLOWED_ORIGIN: http://localhost:5173
          UPLOAD_SCAN_COMMAND: true

      - name: Run V1 scale/load gate
        run: npm run test:v1-scale
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: panama_test
          DB_USER: panama
          DB_PASSWORD: test_password
          DB_SSL: 'false'
          JWT_SECRET: ci_test_jwt_secret_not_used_in_prod_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          VIEWER_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          ALLOWED_ORIGIN: http://localhost:5173

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: panama_test
          DB_USER: panama
          DB_PASSWORD: test_password
          DB_SSL: 'false'
          JWT_SECRET: ci_test_jwt_secret_not_used_in_prod_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_PASSWORD_HASH: $2b$12$eZneW/Dpc9DPfyKDaj2TMea7V4.0PK9EmMYXZ/35m5JkIBKKdZd/m
          VIEWER_PASSWORD_HASH: $2b$12$Fqm4wyinj2K9eafKdNoP.OBwyUl14dGqkOWK.XzqW/2JcuF8qmqs6
          ALLOWED_ORIGIN: http://localhost:5173

      - name: Run UI stress tests
        run: npm run test:ui-stress
        env:
          CI: true

      - name: Verify backup-restore cycle
        run: |
          PGPASSWORD=test_password pg_dump -h localhost -U panama panama_test --no-owner --no-privileges | gzip > /tmp/ci-backup.sql.gz
          LINES=$(gzip -dc /tmp/ci-backup.sql.gz | wc -l)
          echo "Backup: ${LINES} lines"
          test "${LINES}" -gt 100
          PGPASSWORD=test_password createdb -h localhost -U panama panama_verify
          gzip -dc /tmp/ci-backup.sql.gz | PGPASSWORD=test_password psql -h localhost -U panama -d panama_verify --quiet --single-transaction > /dev/null
          LIVE=$(PGPASSWORD=test_password psql -h localhost -U panama -d panama_test -tAc "SELECT MAX(id) FROM migrations")
          RESTORED=$(PGPASSWORD=test_password psql -h localhost -U panama -d panama_verify -tAc "SELECT MAX(id) FROM migrations")
          echo "Migrations: live=${LIVE} restored=${RESTORED}"
          test "${LIVE}" = "${RESTORED}"
          PGPASSWORD=test_password dropdb -h localhost -U panama panama_verify
          echo "Backup-restore verification passed"
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # ── Auto-deploy to production on push to main ────────────────────────────────
  # Requires three GitHub repository secrets:
  #   SERVER_HOST  — IP or hostname of your production server
  #   SERVER_USER  — SSH user (e.g. ubuntu or deploy)
  #   SERVER_SSH_KEY — private SSH key (the public key must be in ~/.ssh/authorized_keys on server)
  #
  # To activate: add the secrets in GitHub → Settings → Secrets and variables → Actions
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    env:
      DEPLOY_CONFIGURED: ${{ secrets.SERVER_HOST != '' && secrets.SERVER_USER != '' && secrets.SERVER_SSH_KEY != '' && secrets.SMOKE_USERNAME != '' && secrets.SMOKE_PASSWORD != '' && secrets.SMOKE_HOME_SLUG != '' }}

    steps:
      - name: Skip deploy when production SSH secrets are not configured
        if: env.DEPLOY_CONFIGURED != 'true'
        run: echo "SERVER_HOST, SERVER_USER, SERVER_SSH_KEY, SMOKE_USERNAME, SMOKE_PASSWORD, and SMOKE_HOME_SLUG must be configured to enable GitHub Actions deploys."

      - name: Deploy to production
        if: env.DEPLOY_CONFIGURED == 'true'
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL || 'http://localhost:3001' }}
          SMOKE_HOME_SLUG: ${{ secrets.SMOKE_HOME_SLUG }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: SMOKE_BASE_URL,SMOKE_HOME_SLUG,SMOKE_USERNAME,SMOKE_PASSWORD
          script: |
            set -e
            export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm use 22 >/dev/null || true
            fi
            export PATH="$HOME/.nvm/versions/node/v22.22.2/bin:$PATH"
            cd /var/www/panama-staffing
            EXPECTED_COMMIT="${{ github.sha }}"
            PREV_COMMIT=$(git rev-parse HEAD)
            git fetch --prune origin main
            git checkout main
            git merge --ff-only "$EXPECTED_COMMIT"
            DEPLOYED_COMMIT=$(git rev-parse HEAD)
            if [ "$DEPLOYED_COMMIT" != "$EXPECTED_COMMIT" ]; then
              echo "VPS HEAD $DEPLOYED_COMMIT does not match expected GitHub SHA $EXPECTED_COMMIT"
              exit 1
            fi
            npm ci
            npm run build
            find dist -name '*.map' -delete
            if ! node scripts/verify-v1-operational-gates.js --strict; then
              echo "Strict V1 operational preflight failed before PM2 stop or migration"
              exit 1
            fi
            bash ./scripts/backup-db.sh
            PRE_MIGRATION_BACKUP=$(ls -t backups/db/panama_*.sql.gz | head -1)
            if [ -z "$PRE_MIGRATION_BACKUP" ]; then
              echo "Could not locate pre-migration backup"
              exit 1
            fi
            rollback_to_previous() {
              reason="$1"
              echo "$reason - rolling back code and database to $PREV_COMMIT"
              set +e
              pm2 stop panama panama-webhooks || true
              RESTORE_USE_ENV_DB=true FORCE_RESTORE_DB=true bash ./scripts/restore-db.sh "$PRE_MIGRATION_BACKUP"
              restore_status=$?
              if [ "$restore_status" -ne 0 ]; then
                set -e
                echo "Rollback aborted: database restore failed with status $restore_status"
                return 1
              fi
              git checkout "$PREV_COMMIT"
              checkout_status=$?
              npm ci
              ci_status=$?
              npm run build
              build_status=$?
              find dist -name '*.map' -delete
              pm2 startOrReload ecosystem.config.cjs --env production --update-env
              pm2_status=$?
              set -e
              if [ "$restore_status" -ne 0 ] || [ "$checkout_status" -ne 0 ] || [ "$ci_status" -ne 0 ] || [ "$build_status" -ne 0 ] || [ "$pm2_status" -ne 0 ]; then
                echo "Rollback incomplete: restore=$restore_status checkout=$checkout_status npm_ci=$ci_status build=$build_status pm2=$pm2_status"
                return 1
              fi
              return 0
            }
            pm2 stop panama panama-webhooks || true
            if ! node scripts/migrate.js; then
              rollback_to_previous "Migration failed"
              exit 1
            fi
            if ! node scripts/verify-v1-operational-gates.js --strict; then
              rollback_to_previous "Strict V1 operational gate failed"
              exit 1
            fi
            npm prune --omit=dev
            pm2 startOrReload ecosystem.config.cjs --env production --update-env
            sleep 5
            if ! {
              curl -f http://localhost:3001/health &&
              curl -f http://localhost:3001/readiness &&
              BASE_URL="${SMOKE_BASE_URL:-http://localhost:3001}" \
              HOME_SLUG="${SMOKE_HOME_SLUG}" \
              SMOKE_USERNAME="${SMOKE_USERNAME}" \
              SMOKE_PASSWORD="${SMOKE_PASSWORD}" \
                bash ./scripts/smoke-vps.sh
            }; then
              rollback_to_previous "Post-deploy verification failed"
              exit 1
            fi
            echo "VPS HEAD verified: $DEPLOYED_COMMIT"
            echo "Health check passed — deploy complete: $(date)"
