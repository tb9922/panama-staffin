name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: panama_test
          POSTGRES_USER: panama
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run database migrations
        run: node scripts/migrate.js
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: panama_test
          DB_USER: panama
          DB_PASSWORD: test_password
          JWT_SECRET: ci_test_jwt_secret_not_used_in_prod_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          VIEWER_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx

      - name: Run unit tests
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: panama_test
          DB_USER: panama
          DB_PASSWORD: test_password
          JWT_SECRET: ci_test_jwt_secret_not_used_in_prod_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          VIEWER_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx

      - name: Run frontend component tests
        run: npm run test:frontend

      - name: Run route auth audit
        run: npm run audit:routes
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: panama_test
          DB_USER: panama
          DB_PASSWORD: test_password
          JWT_SECRET: ci_test_jwt_secret_not_used_in_prod_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          ADMIN_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx
          VIEWER_PASSWORD_HASH: $2b$12$placeholder_not_used_in_unit_tests_xxxxxxxxxxx

  # ── Auto-deploy to production on push to main ────────────────────────────────
  # Requires three GitHub repository secrets:
  #   SERVER_HOST  — IP or hostname of your production server
  #   SERVER_USER  — SSH user (e.g. ubuntu or deploy)
  #   SERVER_SSH_KEY — private SSH key (the public key must be in ~/.ssh/authorized_keys on server)
  #
  # To activate: add the secrets in GitHub → Settings → Secrets and variables → Actions
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/panama-staffing
            git pull origin main
            npm ci --omit=dev
            npm run build
            node scripts/migrate.js
            pm2 restart panama --update-env
            sleep 5
            curl -f http://localhost:3001/health || exit 1
            echo "Health check passed — deploy complete: $(date)"
