services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: panama_test
      POSTGRES_USER: panama
      POSTGRES_PASSWORD: test_password
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panama"]
      interval: 5s
      timeout: 3s
      retries: 10
